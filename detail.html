<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPulse | Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-theme theme-dark">
    <nav class="topbar">
      <div class="topbar-inner container-fluid">
        <a class="brand" href="index.html"><span class="brand-mark">TX</span><span class="brand-name">Tradix</span></a>
        <div class="nav-links d-none d-lg-flex">
          <a href="index.html">Home</a>
          <a class="active" href="market.html">Markets</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="auth.html">Profile</a>
        </div>
        <a class="pro-btn" href="pro.html">⟡ Upgrade to Pro</a>
      </div>
    </nav>

    <main class="container py-5">
      <section class="detail-header d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div class="d-flex align-items-center gap-3">
          <button class="back-btn">←</button>
          <div>
            <h1 class="page-title mb-0">Apple Inc.</h1>
            <div class="text-soft">AAPL</div>
          </div>
        </div>
        <div class="d-flex align-items-center gap-3">
          <div class="avatar-circle">MS</div>
          <div class="text-end">
            <div class="detail-price">$189.30</div>
            <span class="trend-badge success">↗ +1.2%</span>
          </div>
        </div>
      </section>

      <section class="card-surface p-4 mb-4">
        <div class="range-tabs mb-3">
          <button class="range-btn active">1D</button>
          <button class="range-btn">1W</button>
          <button class="range-btn">1M</button>
          <button class="range-btn">1Y</button>
        </div>
        <div class="chart-placeholder candle-chart"></div>
      </section>

      <section class="row g-4">
        <div class="col-md-4 col-lg-3">
          <button class="action-btn sell-btn w-100 mb-3">Sell</button>
          <button class="action-btn buy-btn w-100">Buy</button>
        </div>
        <div class="col-md-8 col-lg-9">
          <div class="card-surface p-4 stats-card h-100">
            <h2 class="section-title mb-4">Statistics</h2>
            <div class="row g-4 stats-grid">
              <div class="col-md-6"><div class="stat-item"><span>Market Cap</span><strong>$2.89T</strong></div></div>
              <div class="col-md-6"><div class="stat-item"><span>P/E Ratio</span><strong>29.34</strong></div></div>
              <div class="col-md-6"><div class="stat-item"><span>Volume</span><strong>58.4M</strong></div></div>
              <div class="col-md-6"><div class="stat-item"><span>Open</span><strong>$176.20</strong></div></div>
              <div class="col-md-6"><div class="stat-item"><span>Close</span><strong>$178.72</strong></div></div>
              <div class="col-md-6"><div class="stat-item"><span>52W High</span><strong>$199.62</strong></div></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
