<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPulse | Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <main class="container py-5">
      <a href="market.html" class="btn btn-outline-light mb-4">← Back to market</a>
      <div class="row g-4">
        <div class="col-lg-5">
          <div class="glass-card p-4">
            <h1 class="fw-bold">Apple Inc. (AAPL)</h1>
            <p class="up fs-4 fw-semibold">+2.14%</p>
            <table class="table table-dark table-borderless mt-3">
              <tr><td>Open</td><td>190.20</td></tr>
              <tr><td>High</td><td>193.10</td></tr>
              <tr><td>Low</td><td>189.40</td></tr>
              <tr><td>Volume</td><td>55.2M</td></tr>
            </table>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="glass-card p-4">
            <div class="d-flex flex-wrap gap-2 mb-3">
              <button class="btn btn-sm btn-outline-light time-btn active">1D</button>
              <button class="btn btn-sm btn-outline-light time-btn">1M</button>
              <button class="btn btn-sm btn-outline-light time-btn">3M</button>
              <button class="btn btn-sm btn-outline-light time-btn">1Y</button>
            </div>
            <canvas id="priceChart" height="140"></canvas>
          </div>
        </div>
      </div>
      <div class="row g-4 mt-1">
        <div class="col-lg-8"><div class="glass-card p-4"><h2 class="h4 mb-3">Related news</h2><ul class="list-group list-group-flush"><li class="list-group-item bg-transparent text-light">Apple announces new product line</li><li class="list-group-item bg-transparent text-light">Analysts upgrade outlook</li></ul></div></div>
        <div class="col-lg-4"><div class="glass-card p-4"><h2 class="h4">Key info</h2><p class="mb-1">Sector: Technology</p><p class="mb-1">Country: USA</p><p class="mb-0">Currency: USD</p></div></div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
