<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPulse | Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-theme theme-dark">
    <nav class="topbar">
      <div class="topbar-inner container-fluid">
        <a class="brand" href="index.html"><span class="brand-mark">TX</span><span class="brand-name">Tradix</span></a>
        <div class="nav-links d-none d-lg-flex">
          <a class="active" href="index.html">Home</a>
          <a href="market.html">Markets</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="auth.html">Profile</a>
        </div>
        <a class="pro-btn" href="pro.html">⟡ Upgrade to Pro</a>
      </div>
    </nav>

    <main class="container py-5">
      <section class="home-hero card-surface p-4 p-lg-5 mb-4">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
          <div>
            <p class="text-soft mb-1">Good morning,</p>
            <h1 class="hero-name mb-0">Mary Sims</h1>
          </div>
          <div class="avatar-circle">MS</div>
        </div>
        <div class="text-center py-4 py-lg-5">
          <p class="text-soft mb-2">Total portfolio value:</p>
          <h2 class="portfolio-total mb-3">$17,826</h2>
          <span class="trend-badge success">↗ +$319.16 (+1.6%) today</span>
        </div>
      </section>

      <section class="row g-4">
        <div class="col-lg-8">
          <div class="card-surface p-4">
            <div class="section-head d-flex justify-content-between align-items-center mb-3">
              <h2 class="section-title mb-0">Portfolio performance</h2>
              <div class="range-tabs">
                <button class="range-btn">1D</button>
                <button class="range-btn active">1W</button>
                <button class="range-btn">1M</button>
                <button class="range-btn">1Y</button>
              </div>
            </div>
            <div class="chart-placeholder line-chart"></div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card-surface p-4 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h2 class="section-title mb-0">Watchlist</h2>
              <a class="view-all" href="#">View all ›</a>
            </div>
            <div class="watchlist-item">
              <div class="watch-icon apple"></div>
              <div class="flex-grow-1">
                <strong>AAPL</strong>
                <div class="text-soft small">Apple Inc.</div>
              </div>
              <div class="text-end">
                <div class="fw-bold">$189.30</div>
                <span class="trend-badge success small">↗ +1.2%</span>
              </div>
            </div>
            <div class="watchlist-item">
              <div class="watch-icon tesla">T</div>
              <div class="flex-grow-1">
                <strong>TSLA</strong>
                <div class="text-soft small">Tesla Inc.</div>
              </div>
              <div class="text-end">
                <div class="fw-bold">$213.17</div>
                <span class="trend-badge success small">↗ +2.7%</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
