<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPulse | Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-body theme-dark">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☼</button>

    <main class="auth-shell">
      <img class="auth-logo" src="https://dummyimage.com/180x120/0f172a/6ee7f9.png&text=TX" alt="Tradix logo" />

      <section class="auth-card">
        <h1 class="auth-title">Welcome to <span>Tradix</span>!</h1>

        <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
          <button class="auth-tab" id="loginTab" data-mode="login">Log in</button>
          <button class="auth-tab active" id="registerTab" data-mode="register">Register</button>
        </div>

        <form id="authForm" class="auth-form">
          <div class="field-group d-none" id="nameGroup">
            <label for="nameInput">Name</label>
            <input id="nameInput" type="text" placeholder="Enter your full name" />
          </div>

          <div class="field-group">
            <label for="emailInput">Email</label>
            <input id="emailInput" type="email" placeholder="Enter your email" />
          </div>

          <div class="field-group">
            <label for="passwordInput">Password</label>
            <input id="passwordInput" type="password" placeholder="Enter your password" />
          </div>

          <a class="forgot-link" href="#">Forgot your password?</a>

          <button type="submit" class="primary-btn" id="submitBtn">Create Account</button>

          <div class="divider"><span>or continue with</span></div>

          <div class="social-row">
            <button type="button" class="social-btn">Google</button>
            <button type="button" class="social-btn">Apple</button>
          </div>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
