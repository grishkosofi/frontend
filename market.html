<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPulse | Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top app-nav">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">StockPulse</a>
        <div class="collapse navbar-collapse show">
          <ul class="navbar-nav ms-auto gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="market.html">Market</a></li>
            <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
            <li class="nav-item"><a class="nav-link" href="auth.html">Sign in</a></li>
            <li class="nav-item"><a class="nav-link" href="pro.html">Pro</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">
        <div>
          <p class="text-uppercase text-secondary small mb-1">Market snapshot</p>
          <h1 class="fw-bold mb-0">News and stock prices</h1>
        </div>
        <div class="controls d-flex flex-wrap gap-2">
          <input class="form-control" id="searchInput" placeholder="Search country or company" />
          <select class="form-select" id="currencySelect"><option>USD</option><option>EUR</option><option>GBP</option></select>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4"><div class="glass-card p-3 news-card"><span class="badge text-bg-danger mb-2">Breaking</span><h3>Tech stocks rebound after strong earnings</h3><p class="text-secondary">Key companies show positive momentum across the session.</p></div></div>
        <div class="col-lg-4"><a class="stock-link glass-card p-3 d-block text-decoration-none" href="detail.html"><div class="d-flex justify-content-between"><strong>AAPL</strong><span class="up">+2.1%</span></div><p class="mb-0 text-secondary">Apple Inc. — click for details</p></a></div>
        <div class="col-lg-4"><a class="stock-link glass-card p-3 d-block text-decoration-none" href="detail.html"><div class="d-flex justify-content-between"><strong>TSLA</strong><span class="down">-1.4%</span></div><p class="mb-0 text-secondary">Tesla — click for details</p></a></div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
