<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockPulse | Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-theme theme-dark">
    <nav class="topbar">
      <div class="topbar-inner container-fluid">
        <a class="brand" href="index.html"><span class="brand-mark">TX</span><span class="brand-name">Tradix</span></a>
        <div class="nav-links d-none d-lg-flex">
          <a href="index.html">Home</a>
          <a class="active" href="market.html">Markets</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="auth.html">Profile</a>
        </div>
        <a class="pro-btn" href="pro.html">⟡ Upgrade to Pro</a>
      </div>
    </nav>

    <main class="container py-5">
      <section class="market-toolbar d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
          <p class="text-soft mb-1">Markets snapshot</p>
          <h1 class="page-title mb-0">News and stock prices</h1>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <input class="search-input" placeholder="Search country or company" />
          <select class="search-input"><option>USD</option><option>EUR</option><option>GBP</option></select>
        </div>
      </section>

      <section class="row g-4">
        <div class="col-lg-4"><div class="card-surface p-4 h-100"><span class="trend-badge danger mb-3">Breaking</span><h3 class="card-title-lg">Tech stocks rebound after strong earnings</h3><p class="text-soft mb-0">Apple, Nvidia, and Microsoft see improved momentum.</p></div></div>
        <div class="col-lg-4"><a href="detail.html" class="card-surface p-4 h-100 d-block text-decoration-none stock-card"><div class="d-flex justify-content-between align-items-center"><strong>AAPL</strong><span class="trend-badge success">+2.1%</span></div><p class="text-soft mt-2 mb-0">Apple Inc. — click for details</p></a></div>
        <div class="col-lg-4"><a href="detail.html" class="card-surface p-4 h-100 d-block text-decoration-none stock-card"><div class="d-flex justify-content-between align-items-center"><strong>TSLA</strong><span class="trend-badge danger">-1.4%</span></div><p class="text-soft mt-2 mb-0">Tesla — click for details</p></a></div>
      </section>
    </main>
  </body>
</html>
